.card:active{transform:scale(0.97);border-color:#f59e0b}
.card:hover{border-color:#f59e0b55}

.card .i{padding:8px 10px;flex:1;min-width:0}
.card .i h3{font-size:13px;color:#f8fafc;margin-bottom:1px;display:flex;align-items:center;gap:3px}
.card .i .ar{font-size:10px;color:#94a3b8;margin-bottom:1px}

.bc{background:#f59e0b30;color:#fcd34d}
.bs{background:#3b82f630;color:#93c5fd}
.br{background:#22c55e30;color:#86efac}

.card .i .r{font-size:10px;color:#fbbf24;margin-top:1px}

const DAYS = [
  {
    title: '📅 יום 1 — שני 25.5 — Downtown 🏛️ + Rainbow 🌈',
    note: 'צהריים + ערב במרכז ההיסטורי',
    places: [0, 41, 43, 44, 42, 8, 17, 1, 18, 19, 20, 23, 7, 21, 27]
  },
  {
    title: '📅 יום 2 — שלישי 26.5 — Abdali 🏬 + Sweifieh 🛍️',
    note: 'קניות כבדות + אוכל יוקרתי',
    note: 'קניות כבדות + אוכל יוקרתי',
    places: [16, 28, 10, 24, 11, 14, 12, 5, 6, 4, 13, 31, 33, 36, 38, 39, 45, 48]
  },
  {
    title: '📅 יום 3 — רביעי 27.5 — مكة 🚶 + Dabouq 🌳',
    note: 'אזור מיקה + הכפר היוקרתי',
    places: [34, 30, 2, 3, 25, 9, 15, 35, 40, 46, 26, 37, 49]
  },
  {
    title: '📅 יום 4 — חמישי 28.5 — Taj 💎 + Galleria 👗',
    note: 'קניות אחרונות + ערב סיום',
    places: [29, 22, 44, 32, 41, 45, 47, 14, 11, 5, 6, 1, 7, 0, 20]
  }
];

// ===== MAP =====
const map = L.map('map', { zoomControl: true }).setView([31.953, 35.90], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap'
}).addTo(map);

const COLORS = { food:'#ef4444', cafe:'#f59e0b', shop:'#3b82f6', street:'#22c55e' };
const CAT_LABELS = { food:'🍽️ מסעדה', cafe:'☕ בית קפה', shop:'🛍️ קניות', street:'🌈 רחוב' };

function makeIcon(color, order) {
  const showOrder = order !== undefined && order !== null;
  const bg = showOrder ? `background:${color};` : `background:${color}aa;transform:scale(0.85);`;
  const html = showOrder
    ? `<div style="${bg}width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.6);">${order}</div>`
    : `<div style="${bg}width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);"></div>`;
  return L.divIcon({ html, iconSize: showOrder ? [30,30] : [24,24], iconAnchor: [15,15], className: '' });
}

function makePopupContent(p) {
  const ph = getPhoto(p);
  const imgStyle = ph.type === 'url'
    ? `background-image:url('${ph.val}');background-size:cover;background-position:center;`
    : `background:${ph.val};display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,0.25);text-shadow:0 2px 10px rgba(0,0,0,0.3);`;
  const imgContent = ph.type === 'url' ? '' : p.e;
  return `<div style="direction:rtl;text-align:right;font-family:sans-serif;">
    <div class="popup-img" style="${imgStyle}">${imgContent}</div>
    <div class="popup-body">
      <h3>${p.e} ${p.n}</h3>
      <div class="ar">${p.a}</div>
      <div class="desc">${p.d}</div>
      <div class="meta">
        <span class="rating">${p.r || '⭐4.5'}</span>
        <span>${CAT_LABELS[p.c]}</span>
      </div>
    </div>
  </div>`;
}

let allMarkers = [];
let dayPolylines = [];
let currentDayIdx = 0;
let currentFilter = 'all';

P.forEach((p, i) => {
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(COLORS[p.c]) }).addTo(map);
  m.bindPopup(makePopupContent(p));
  m.on('mouseover', function() {
    if (this._icon) this._icon.style.transform += ' scale(1.2)';
  });
  m.on('mouseout', function() {
    if (this._icon) this._icon.style.transform = this._icon.style.transform.replace(/scale\(1\.2\)/,'');
  });
  allMarkers.push(m);
});

// ===== DRAW DAY =====
function drawDay(dayIdx) {
  const day = DAYS[dayIdx];
  currentDayIdx = dayIdx;

  dayPolylines.forEach(l => map.removeLayer(l));
  dayPolylines = [];

  allMarkers.forEach((m, i) => {
    m.setIcon(makeIcon(COLORS[P[i].c]));
    map.removeLayer(m);
  });

  const coords = [];
  const placeIndices = day.places;

  placeIndices.forEach((pi, order) => {
    const p = P[pi];
    const m = allMarkers[pi];
    map.addLayer(m);
    m.setIcon(makeIcon(COLORS[p.c], order + 1));
    if (m._icon) m._icon.style.zIndex = 1000 + (100 - order);
    coords.push([p.lat, p.lng]);
  });

  if (coords.length > 1) {
    const polyline = L.polyline(coords, {
      color: '#f59e0b', weight: 3, opacity: 0.7,
      dashArray: '8, 8', lineCap: 'round'
    }).addTo(map);
    dayPolylines.push(polyline);
  }

  if (coords.length > 0) {
    map.fitBounds(L.latLngBounds(coords), { padding: [30, 30] });
  }

  document.getElementById('day-title').innerHTML = `${day.title} <small>${day.note}</small>`;
  renderList(placeIndices);
}

// ===== RENDER LIST =====
function renderList(placeIndices) {
  const el = document.getElementById('list');
  el.innerHTML = '';
  placeIndices.forEach((pi, order) => {
    const p = P[pi];
    const cls = { food:'bf', cafe:'bc', shop:'bs', street:'br' };
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      const m = allMarkers[pi];
      map.setView([p.lat, p.lng], 16, { animate: true });
      m.openPopup();
    };
    const ph = getPhoto(p);
    const thumbStyle = ph.type === 'url'
      ? `background-image:url('${ph.val}');background-size:cover;background-position:center;`
      : `background:${ph.val};display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,0.3);`;
    const thumbContent = ph.type === 'url' ? '' : p.e;
    card.innerHTML = `
      <div class="card-order">${order+1}</div>
      <div class="thumb" style="${thumbStyle}">${thumbContent}</div>
      <div class="i">
        <h3>${p.e} ${p.n}</h3>
        <div class="ar">${p.a}</div>
        <span class="badge ${cls[p.c]}">${CAT_LABELS[p.c]}</span>
        <div class="d">${p.d}</div>
        ${p.r ? `<div class="r">${p.r}</div>` : ''}
      </div>`;
    el.appendChild(card);
  });
}

// ===== FILTER =====
function f(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[onclick*="${cat}"]`).classList.add('active');

  const day = DAYS[currentDayIdx];
  const placeIndices = day.places;

  allMarkers.forEach((m, i) => {
    m.setIcon(makeIcon(COLORS[P[i].c]));
    map.removeLayer(m);
  });
  dayPolylines.forEach(l => map.removeLayer(l));
  dayPolylines = [];

  const filtered = cat === 'all' ? placeIndices : placeIndices.filter(pi => P[pi].c === cat);
  const coords = [];
  filtered.forEach((pi, order) => {
    const p = P[pi], m = allMarkers[pi];
    map.addLayer(m);
    m.setIcon(makeIcon(COLORS[p.c], order + 1));
    if (m._icon) m._icon.style.zIndex = 1000 + (100 - order);
    coords.push([p.lat, p.lng]);
  });

  if (coords.length > 1) {
    const polyline = L.polyline(coords, {
      color: '#f59e0b', weight: 3, opacity: 0.7, dashArray: '8, 8', lineCap: 'round'
    }).addTo(map);
    dayPolylines.push(polyline);
  }
  if (coords.length > 0) map.fitBounds(L.latLngBounds(coords), { padding: [30, 30] });

  const el = document.getElementById('list');
  el.innerHTML = '';
  filtered.forEach((pi, order) => {
    const p = P[pi];
    const cls = { food:'bf', cafe:'bc', shop:'bs', street:'br' };
    const ph = getPhoto(p);
    const thumbStyle = ph.type === 'url'
      ? `background-image:url('${ph.val}');background-size:cover;background-position:center;`
      : `background:${ph.val};display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,0.3);`;
    const thumbContent = ph.type === 'url' ? '' : p.e;
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      map.setView([p.lat, p.lng], 16, { animate: true });
      allMarkers[pi].openPopup();
    };
    card.innerHTML = `
      <div class="card-order">${order+1}</div>
      <div class="thumb" style="${thumbStyle}">${thumbContent}</div>
      <div class="i">
        <h3>${p.e} ${p.n}</h3>
        <div class="ar">${p.a}</div>
        <span class="badge ${cls[p.c]}">${CAT_LABELS[p.c]}</span>
        <div class="d">${p.d}</div>
        ${p.r ? `<div class="r">${p.r}</div>` : ''}
      </div>`;
    el.appendChild(card);
  });
}

// ===== SHOW DAY =====
function showDay(idx) {
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.day-tab')[idx].classList.add('active');
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn.abtn').classList.add('active');
  currentFilter = 'all';
  drawDay(idx);
}

// ===== ALL MARKERS BUTTON (toggle dimmed) =====
// Press and hold on the map title area to see all 48
function showAllMarkers() {
  allMarkers.forEach((m, i) => {
    const p = P[i];
    m.setIcon(makeIcon(COLORS[p.c]));
    map.addLayer(m);
  });
  map.setView([31.953, 35.90], 12);
  dayPolylines.forEach(l => map.removeLayer(l));
  dayPolylines = [];
  document.getElementById('day-title').textContent = '📍 כל 48 הנקודות על המפה';
  document.getElementById('list').innerHTML = '';
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
}

// ===== INIT =====
drawDay(0);
</script>
</body>
</html>
