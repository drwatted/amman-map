<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1a365d,#0f172a);padding:16px;text-align:center;border-bottom:2px solid #f59e0b}
.header h1{font-size:22px;color:#f8fafc}
.header h1 span{color:#f59e0b}
.header p{font-size:13px;color:#94a3b8;margin-top:2px}
.map-container{width:100%;height:60vh;border-bottom:3px solid #f59e0b}
.map-container iframe{width:100%;height:100%;border:none}
.filters{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#1e293b;position:sticky;top:0;z-index:1000;-webkit-overflow-scrolling:touch}
.filter-btn{padding:7px 14px;border-radius:20px;border:none;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px;transition:all 0.2s}
.filter-btn.active{box-shadow:0 0 0 2px white,0 0 0 4px currentColor}
.fbtn{background:#ef4444ee;color:white}
.cbtn{background:#f59e0bee;color:white}
.sbtn{background:#3b82f6ee;color:white}
.rbtn{background:#22c55eee;color:white}
.abtn{background:#64748b;color:white}
.list{padding:12px;max-width:100%}
.card{display:block;width:100%;margin-bottom:10px;background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid #334155;text-decoration:none;color:inherit;transition:all 0.2s}
.card:active{transform:scale(0.98);border-color:#f59e0b}
.card .i{padding:12px;position:relative}
.card .i h3{font-size:15px;color:#f8fafc;margin-bottom:2px}
.card .i .ar{font-size:12px;color:#94a3b8;margin-bottom:3px}
.badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;margin:2px 0}
.bf{background:#ef444430;color:#fca5a5}
.bc{background:#f59e0b30;color:#fcd34d}
.bs{background:#3b82f630;color:#93c5fd}
.br{background:#22c55e30;color:#86efac}
.card .i .d{font-size:12px;color:#94a3b8;margin-top:4px}
.card .i .r{font-size:12px;margin-top:3px;color:#fbbf24}
.card .i .p{font-size:12px;color:#fbbf24;margin-top:2px}
</style>

function gmURL(p){return 'https://www.google.com/maps?q='+p.lat+','+p.lng}

function render(cat){
  const el=document.getElementById('list');
  el.innerHTML='';
  const items=cat==='all'?D:D.filter(x=>x.cat===cat);
  const cls={food:'bf',cafe:'bc',shop:'bs',street:'br'};
  const lb={food:'🍽️ מסעדה',cafe:'☕ בית קפה',shop:'🛍️ קניות',street:'🌈 אזור'};
  items.forEach(p=>{
    const a=document.createElement('a');a.className='card';a.href=gmURL(p);a.target='_blank';
    a.innerHTML='<div class="i"><h3>'+p.e+' '+p.name+'</h3><div class="ar">'+p.ar+'</div><span class="badge '+cls[p.cat]+'">'+lb[p.cat]+'</span><div class="d">'+p.d+'</div>'+(p.r?'<div class="r">'+p.r+'</div>':'')+(p.p?'<div class="p">'+p.p+'</div>':'')+'</div>';
    el.appendChild(a);
  });
}

function f(cat){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.filter-btn[onclick*="${cat}"]`).classList.add('active');
  render(cat);
}
render('all');
