  transition: all 0.2s;

.place-card:hover { border-color: #f59e0b; transform: translateY(-2px); }

}

.place-card .info h3 { font-size: 15px; color: #f8fafc; margin-bottom: 4px; }

.cat-cafe { background: #f59e0b30; color: #fcd34d; }
.cat-shop { background: #3b82f630; color: #93c5fd; }
.cat-attraction { background: #8b5cf630; color: #c4b5fd; }

// ===== MAP =====
const map = L.map('map', { zoomControl: true }).setView([31.953, 35.90], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap',
}).addTo(map);

// Color per category
function getIcon(color) {
  return L.divIcon({
    html: `<div style="background:${color};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);transform:translate(-50%,-50%)">`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    className: ''
  });
}

const ICONS = {
  food: '#ef4444', cafe: '#f59e0b', shop: '#3b82f6', attraction: '#8b5cf6'
};

const markers = [];
const markerMap = {};

places.forEach((p, i) => {
  const color = ICONS[p.cat] || '#64748b';
  const marker = L.marker([p.lat, p.lng], { icon: getIcon(color) }).addTo(map);
  
  const popupContent = `
    <div style="direction:rtl;text-align:right;font-family:sans-serif;">
      <h3>${p.emoji} ${p.name}</h3>
      <div class="ar">${p.ar}</div>
      <div style="margin:4px 0;">${p.desc}</div>
      ${p.rating ? `<div style="color:#f59e0b;">${p.rating}</div>` : ''}
      ${p.price ? `<div>${p.price}</div>` : ''}
      ${p.youtube ? `<div style="margin-top:4px;"><a href="${p.youtube}" target="_blank" style="color:#ef4444;">▶️ צפה ביוטיוב</a></div>` : ''}
      <div style="margin-top:4px;font-size:11px;color:#888;">לחץ על הכרטיסייה למטה לפרטים</div>
    </div>
  `;
  marker.bindPopup(popupContent);
  
  markers.push(marker);
  markerMap[i] = marker;
  p._idx = i;
});

// ===== PLACES LIST =====
function renderPlaces(filter) {
  const list = document.getElementById('placesList');
  list.innerHTML = '';
  
  const filtered = filter === 'all' ? places : places.filter(p => p.cat === filter);
  
  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'place-card';
    card.onclick = () => {
      const idx = p._idx;
      if (markerMap[idx]) {
        map.setView([p.lat, p.lng], 15);
        markerMap[idx].openPopup();
      }
    };
    
    const catClass = `cat-${p.cat}`;
    card.innerHTML = `
      <div class="info">
        <div class="emoji-badge">${p.emoji}</div>
        <h3>${p.icon} ${p.name}</h3>
        <div class="ar">${p.ar}</div>
        <span class="cat ${catClass}">${p.cat === 'food' ? '🍽️ מסעדה' : p.cat === 'cafe' ? '☕ בית קפה' : p.cat === 'shop' ? '🛍️ קניות' : '🏛️ אטרקציה'}</span>
        <div class="desc">${p.desc}</div>
        ${p.rating ? `<div class="rating">${p.rating}</div>` : ''}
        ${p.price ? `<div class="price">${p.price}</div>` : ''}
        ${p.youtube ? `<div class="youtube">▶️ <a href="${p.youtube}" target="_blank">צפה ביוטיוב</a></div>` : ''}
      </div>
    `;
    list.appendChild(card);
  });
}

// ===== FILTER =====
function filterPlaces(cat) {
  document.querySelectorAll('#filters .legend-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#filters [onclick*="${cat}"]`)?.classList.add('active');
  
  // Show/hide markers
  markers.forEach((m, i) => {
    if (cat === 'all' || places[i].cat === cat) {
      map.addLayer(m);
    } else {
      map.removeLayer(m);
    }
  });
  
  renderPlaces(cat);
}

// Initial render
renderPlaces('all');

// Fit map bounds
const group = L.featureGroup(markers);
map.fitBounds(group.getBounds().pad(0.15));
</script>
