body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

.cbtn { background: #f59e0bee; color: white; }
.sbtn { background: #3b82f6ee; color: white; }
.rbtn { background: #22c55eee; color: white; }

.list { padding: 12px; max-width: 100%; }
.card { display: block; width: 100%; margin-bottom: 10px; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; text-decoration: none; color: inherit; }
.card:hover, .card:active { border-color: #f59e0b; transform: translateY(-1px); }
.card .i { padding: 12px; }
.card .i h3 { font-size: 15px; color: #f8fafc; margin-bottom: 2px; }
.card .i .ar { font-size: 12px; color: #94a3b8; margin-bottom: 3px; }
.badge { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 10px; margin: 2px 0; }

.bc { background: #f59e0b30; color: #fcd34d; }
.bs { background: #3b82f630; color: #93c5fd; }
.br { background: #22c55e30; color: #86efac; }
.card .i .d { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.card .i .r { font-size: 12px; margin-top: 3px; color: #fbbf24; }
.card .i .p { font-size: 12px; color: #fbbf24; margin-top: 2px; }
.leaflet-popup-content { direction: rtl; text-align: right; font-size: 13px; min-width: 200px; }
.leaflet-popup-content h3 { font-size: 14px; margin-bottom: 3px; color: #1e293b; }
.leaflet-popup-content .ar { font-size: 12px; color: #64748b; }
.leaflet-popup-content .d2 { font-size: 12px; margin-top: 4px; }
.leaflet-popup-content .r2 { font-size: 12px; margin-top: 3px; color: #f59e0b; }
.leaflet-popup-content .p2 { font-size: 12px; }
</style>

// ===== MAP =====
const map = L.map('map', { zoomControl: true }).setView([31.953, 35.90], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

const COLORS = { food:'#ef4444', cafe:'#f59e0b', shop:'#3b82f6', street:'#22c55e' };
const CAT_LABELS = { food:'🍽️ מסעדה', cafe:'☕ בית קפה', shop:'🛍️ קניות', street:'🌈 רחוב' };

function makeIcon(color) {
  return L.divIcon({
    html: `<div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>`,
    iconSize: [28,28], iconAnchor: [14,14], className: ''
  });
}

const markers = [];
const markerByIdx = {};

D.forEach((p,i)=>{
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(COLORS[p.c]) }).addTo(map);
  m.bindPopup(
    `<div style="direction:rtl;text-align:right;font-family:sans-serif;min-width:180px;">
      <h3>${p.e} ${p.n}</h3>
      <div style="font-size:11px;color:#64748b;">${p.a}</div>
      <div class="d2">${p.d}</div>
      ${p.r ? `<div class="r2">${p.r}</div>` : ''}
      ${p.p ? `<div class="p2">${p.p}</div>` : ''}
    </div>`
  );
  markers.push(m);
  markerByIdx[i] = m;
  p._idx = i;
});

// ===== RENDER LIST =====
function renderList(cat) {
  const el = document.getElementById('list');
  el.innerHTML = '';
  const items = cat === 'all' ? D : D.filter(x => x.c === cat);
  
  items.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      const mi = markerByIdx[p._idx];
      if (mi) { map.setView([p.lat, p.lng], 15, { animate: true }); mi.openPopup(); }
    };
    const cls = { food:'bf', cafe:'bc', shop:'bs', street:'br' };
    card.innerHTML = `<div class="i">
      <h3>${p.e} ${p.n}</h3>
      <div class="ar">${p.a}</div>
      <span class="badge ${cls[p.c]}">${CAT_LABELS[p.c]}</span>
      <div class="d">${p.d}</div>
      ${p.r ? `<div class="r">${p.r}</div>` : ''}
      ${p.p ? `<div class="p">${p.p}</div>` : ''}
    </div>`;
    el.appendChild(card);
  });
}

// ===== FILTER =====
function f(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[onclick*="${cat}"]`).classList.add('active');
  markers.forEach((m, i) => {
    if (cat === 'all' || D[i].c === cat) map.addLayer(m);
    else map.removeLayer(m);
  });
  renderList(cat);
}

renderList('all');
const group = L.featureGroup(markers);
map.fitBounds(group.getBounds().pad(0.15));
</script>
