<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1a365d,#0f172a);padding:14px;text-align:center;border-bottom:2px solid #f59e0b}
.header h1{font-size:20px;color:#f8fafc}
.header h1 span{color:#f59e0b}
.header p{font-size:12px;color:#94a3b8;margin-top:2px}
.day-tabs{display:flex;gap:4px;padding:8px 10px;overflow-x:auto;background:#1e293b;-webkit-overflow-scrolling:touch}
.day-tab{padding:7px 12px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s;background:#334155;color:#94a3b8}
.day-tab.active{background:#f59e0b;color:#0f172a;box-shadow:0 0 10px rgba(245,158,11,0.4)}
.day-tab:hover{background:#475569;color:white}
#map{height:55vh;width:100%;border-bottom:2px solid #f59e0b;background:#1e293b}
.filters{display:flex;gap:6px;padding:8px 10px;overflow-x:auto;background:#1e293b;position:sticky;top:0;z-index:1000;-webkit-overflow-scrolling:touch}
.filter-btn{padding:5px 12px;border-radius:16px;border:none;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s;opacity:0.6}
.filter-btn.active{opacity:1;box-shadow:0 0 0 2px white}
.fbtn{background:#ef4444ee;color:white}
.cbtn{background:#f59e0bee;color:white}
.sbtn{background:#3b82f6ee;color:white}
.rbtn{background:#22c55eee;color:white}
.abtn{background:#64748b;color:white}
#day-title{padding:10px 12px 4px;font-size:15px;font-weight:600;color:#f59e0b;display:flex;align-items:center;gap:6px}
#day-title small{font-weight:400;font-size:12px;color:#94a3b8}
.list{padding:8px 12px 20px;max-width:100%}
.card{display:flex;align-items:stretch;margin-bottom:8px;background:#1e293b;border-radius:10px;overflow:hidden;border:1px solid #334155;cursor:pointer;transition:all 0.2s;text-decoration:none;color:inherit}
.card:active{transform:scale(0.97);border-color:#f59e0b}
.card-order{display:flex;align-items:center;justify-content:center;min-width:32px;background:#f59e0b20;color:#f59e0b;font-size:13px;font-weight:700}
.card .i{padding:10px 12px;flex:1;min-width:0}
.card .i h3{font-size:14px;color:#f8fafc;margin-bottom:1px}
.card .i .ar{font-size:11px;color:#94a3b8;margin-bottom:2px}
.badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:8px}
.bf{background:#ef444430;color:#fca5a5}
.bc{background:#f59e0b30;color:#fcd34d}
.bs{background:#3b82f630;color:#93c5fd}
.br{background:#22c55e30;color:#86efac}
.card .i .d{font-size:11px;color:#94a3b8;margin-top:2px}
.leaflet-popup-content{direction:rtl;text-align:right;font-size:13px;min-width:180px}
.leaflet-popup-content h3{font-size:14px;margin-bottom:2px;color:#1e293b}
</style>
</head>

<div id="map"></div>

<div class="filters" id="filters">

  {n:'Gold Souq',a:'سوق الذهب',lat:31.9515,lng:35.9345,c:'shop',e:'👑',d:'שוק הזהב! 21K'},
  {n:'Perfume Souq',a:'سوق البخارية',lat:31.9510,lng:35.9340,c:'shop',e:'🌿',d:'תבלינים, בשמים'},
  {n:'Habiba Sweets',a:'حبيبة',lat:31.9530,lng:35.9350,c:'shop',e:'🍯',d:'קנאפה! בקלאווה!',r:'⭐4.5'},
  {n:'Rawan Cake',a:'روان كيك',lat:31.9487,lng:35.8649,c:'shop',e:'🧁',d:'קייקז מושקעים',r:'⭐4.5'},

  // idx:41-47 STREETS
  {n:'Mecca Street',a:'شارع مكة',lat:31.9800,lng:35.8700,c:'street',e:'🚶',d:'3 ק"מ קניות! זול!'},
  {n:'Wakalat Street',a:'الوكالات',lat:31.9540,lng:35.8700,c:'street',e:'👠',d:'מתחם מותגים'},
  {n:'Rainbow Street',a:'الرينبو',lat:31.9490,lng:35.9220,c:'street',e:'🌈',d:'תוסס! קפה, אוכל, בוטיקים'},
  {n:'Sweifieh Area',a:'الصويفية',lat:31.9545,lng:35.8705,c:'street',e:'🛍️',d:'רובע קניות ואופנה'},
  {n:'Dabouq Village',a:'دابوق',lat:31.9400,lng:35.8450,c:'street',e:'🌳',d:'בוטיקים יוקרתיים'},
  {n:'Hungry Street',a:'الجوعانين',lat:31.9710,lng:35.8760,c:'street',e:'🌯',d:'רחוב האוכל! 5+ מאכלים'},
  {n:'The Workshop',a:'ذا وورك شوب',lat:31.9492,lng:35.9225,c:'shop',e:'🎨',d:'עיצוב מקומי, מתנות'},
];

// ===== DAILY PLANS (array of place indices) =====
const DAYS = [
  { // Day 1 - Monday 25.5 - Downtown + Rainbow
    title: '📅 יום 1 — שני 25.5 — Downtown 🏛️ + Rainbow Street 🌈',
    note: 'הגעה מישראל • צהריים + ערב במרכז ההיסטורי',
    places: [0, 41, 43, 44, 42, 8, 17, 1, 18, 19, 20, 23, 7, 21, 27]
  },
  { // Day 2 - Tuesday 26.5 - Abdali + Sweifieh + Abdoun
    title: '📅 יום 2 — שלישי 26.5 — Abdali 🏬 + Sweifieh 🛍️',
    note: 'קניות כבדות במולים + אוכל יוקרתי',
    places: [16, 28, 10, 24, 11, 14, 12, 5, 6, 4, 13, 31, 33, 36, 38, 39, 45]
  },
  { // Day 3 - Wednesday 27.5 - Mecca Street + Dabouq
    title: '📅 יום 3 — רביעי 27.5 — مكة 🚶 + دابوق 🌳',
    note: 'אזור מיקה + כפר דאבוק היוקרתי',
    places: [34, 30, 2, 3, 25, 9, 15, 35, 40, 46, 26, 37]
  },
  { // Day 4 - Thursday 28.5 - Last shopping + Rainbow farewell
    title: '📅 יום 4 — חמישי 28.5 — Taj 💎 + Galleria 👗',
    note: 'קניות אחרונות + ערב סיום',
    places: [29, 22, 44, 32, 41, 45, 47, 14, 11, 5, 6, 1, 7, 0, 20]
  }
];

// ===== MAP =====
const map = L.map('map', { zoomControl: true }).setView([31.953, 35.90], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap'
}).addTo(map);

const COLORS = { food:'#ef4444', cafe:'#f59e0b', shop:'#3b82f6', street:'#22c55e' };
const CAT_LABELS = { food:'🍽️ מסעדה', cafe:'☕ בית קפה', shop:'🛍️ קניות', street:'🌈 רחוב' };

function makeIcon(color, order) {
  const showOrder = order !== undefined && order !== null;
  const bg = showOrder ? `background:${color};` : `background:${color}aa;transform:scale(0.85);`;
  const html = showOrder
    ? `<div style="${bg}width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.6);">${order}</div>`
    : `<div style="${bg}width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);"></div>`;
  return L.divIcon({
    html,
    iconSize: showOrder ? [30,30] : [24,24],
    iconAnchor: showOrder ? [15,15] : [12,12],
    className: ''
  });
}

let allMarkers = [];
let dayPolylines = [];
let currentDayIdx = 0;
let currentFilter = 'all';

P.forEach((p, i) => {
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(COLORS[p.c]) }).addTo(map);
  m.bindPopup(`<div style="direction:rtl;text-align:right;font-family:sans-serif;">
    <h3>${p.e} ${p.n}</h3>
    <div style="font-size:11px;color:#64748b;">${p.a}</div>
    <div style="font-size:12px;margin-top:4px;">${p.d}</div>
    ${p.r ? `<div style="color:#f59e0b;font-size:11px;margin-top:2px;">${p.r}</div>` : ''}
    <div style="font-size:11px;margin-top:2px;color:#888;">מס' ${i+1} ברשימה</div>
  </div>`);
  allMarkers.push(m);
});

// ===== DRA4) DAY ROUTE =====
function drawDay(dayIdx) {
  const day = DAYS[dayIdx];
  currentDayIdx = dayIdx;

  // Clear old polyline
  dayPolylines.forEach(l => map.removeLayer(l));
  dayPolylines = [];

  // Reset all markers to dim
  allMarkers.forEach((m, i) => {
    m.setIcon(makeIcon(COLORS[P[i].c]));
    map.removeLayer(m);
  });

  // Show only this day's places, with order numbers
  const coords = [];
  const placeIndices = day.places;

  placeIndices.forEach((pi, order) => {
    const p = P[pi];
    const m = allMarkers[pi];
    map.addLayer(m);
    m.setIcon(makeIcon(COLORS[p.c], order + 1));
    // Move to front
    if (m._icon) m._icon.style.zIndex = 1000 + (100 - order);
    coords.push([p.lat, p.lng]);
  });

  // Draw route line
  if (coords.length > 1) {
    const polyline = L.polyline(coords, {
      color: '#f59e0b',
      weight: 3,
      opacity: 0.7,
      dashArray: '8, 8',
      lineCap: 'round'
    }).addTo(map);
    dayPolylines.push(polyline);
  }

  // Fit map to show all places
  if (coords.length > 0) {
    const bounds = L.latLngBounds(coords);
    map.fitBounds(bounds, { padding: [30, 30] });
  }

  // Update title
  document.getElementById('day-title').innerHTML = `${day.title} <small>${day.note}</small>`;

  // Render list
  renderList(placeIndices);
}

// ===== RENDER LIST =====
function renderList(placeIndices) {
  const el = document.getElementById('list');
  el.innerHTML = '';

  placeIndices.forEach((pi, order) => {
    const p = P[pi];
    const cls = { food:'bf', cafe:'bc', shop:'bs', street:'br' };
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      const m = allMarkers[pi];
      map.setView([p.lat, p.lng], 15, { animate: true });
      m.openPopup();
      if (m._icon) {
        m._icon.style.transform = m._icon.style.transform.replace(/scale\([^)]+\)/, 'scale(1.2)');
        setTimeout(() => { if(m._icon) m._icon.style.transform = m._icon.style.transform.replace(/scale\(1\.2\)/, 'scale(1)'); }, 1000);
      }
    };
    card.innerHTML = `
      <div class="card-order">${order+1}</div>
      <div class="i">
        <h3>${p.e} ${p.n}</h3>
        <div class="ar">${p.a}</div>
        <span class="badge ${cls[p.c]}">${CAT_LABELS[p.c]}</span>
        <div class="d">${p.d}</div>
        ${p.r ? `<div class="d" style="color:#fbbf24">${p.r}</div>` : ''}
      </div>`;
    el.appendChild(card);
  });
}

// ===== FILTER (within current day) =====
function f(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[onclick*="${cat}"]`).classList.add('active');

  const day = DAYS[currentDayIdx];
  const placeIndices = day.places;

  // Reset all markers
  allMarkers.forEach((m, i) => {
    m.setIcon(makeIcon(COLORS[P[i].c]));
    map.removeLayer(m);
  });

  // Clear polylines
  dayPolylines.forEach(l => map.removeLayer(l));
  dayPolylines = [];

  // Filter
  const filtered = cat === 'all'
    ? placeIndices
    : placeIndices.filter(pi => P[pi].c === cat);

  const coords = [];
  filtered.forEach((pi, order) => {
    const p = P[pi];
    const m = allMarkers[pi];
    map.addLayer(m);
    m.setIcon(makeIcon(COLORS[p.c], order + 1));
    if (m._icon) m._icon.style.zIndex = 1000 + (100 - order);
    coords.push([p.lat, p.lng]);
  });

  if (coords.length > 1) {
    const polyline = L.polyline(coords, {
      color: '#f59e0b', weight: 3, opacity: 0.7,
      dashArray: '8, 8', lineCap: 'round'
    }).addTo(map);
    dayPolylines.push(polyline);
  }
  if (coords.length > 0) {
    map.fitBounds(L.latLngBounds(coords), { padding: [30, 30] });
  }

  // Re-render list
  const el = document.getElementById('list');
  el.innerHTML = '';
  filtered.forEach((pi, order) => {
    const p = P[pi];
    const cls = { food:'bf', cafe:'bc', shop:'bs', street:'br' };
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => {
      const m = allMarkers[pi];
      map.setView([p.lat, p.lng], 15, { animate: true });
      m.openPopup();
    };
    card.innerHTML = `
      <div class="card-order">${order+1}</div>
      <div class="i">
        <h3>${p.e} ${p.n}</h3>
        <div class="ar">${p.a}</div>
        <span class="badge ${cls[p.c]}">${CAT_LABELS[p.c]}</span>
        <div class="d">${p.d}</div>
        ${p.r ? `<div class="d" style="color:#fbbf24">${p.r}</div>` : ''}
      </div>`;
    el.appendChild(card);
  });
}

// ===== SHOW DAY =====
function showDay(idx) {
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.day-tab')[idx].classList.add('active');
  // Reset filter to 'all'
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn.abtn').classList.add('active');
  currentFilter = 'all';
  drawDay(idx);
}

// ===== INIT =====
drawDay(0);
</script>
