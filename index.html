<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
.header {
  background: linear-gradient(135deg, #1a365d, #0f172a);
  padding: 16px; text-align: center; border-bottom: 2px solid #f59e0b;
}
.header h1 { font-size: 22px; color: #f8fafc; }
.header h1 span { color: #f59e0b; }
.header p { font-size: 13px; color: #94a3b8; margin-top: 2px; }
#map { height: 60vh; width: 100%; border-bottom: 3px solid #f59e0b; }
.legend-buttons {
  display: flex; gap: 6px; padding: 10px 12px;
  overflow-x: auto; background: #1e293b; 
  position: sticky; top: 0; z-index: 1000;
  -webkit-overflow-scrolling: touch;
}
.legend-btn {
  padding: 7px 14px; border-radius: 20px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
}
.legend-btn:hover { transform: scale(1.05); }
.legend-btn.active { box-shadow: 0 0 0 2px white, 0 0 0 4px currentColor; }
.food-btn { background: #ef4444ee; color: white; }
.cafe-btn { background: #f59e0bee; color: white; }
.shop-btn { background: #3b82f6ee; color: white; }
.street-btn { background: #22c55eee; color: white; }
.all-btn { background: #64748b; color: white; }
.places-list { padding: 12px; max-width: 100%; }
.place-card {
  display: inline-block; width: 100%; margin-bottom: 10px;
  background: #1e293b; border-radius: 12px; overflow: hidden;
  border: 1px solid #334155; cursor: pointer;
  transition: all 0.2s;
}
.place-card:hover, .place-card:active { border-color: #f59e0b; transform: translateY(-1px); }
.place-card .info { padding: 12px; position: relative; }
.place-card .info h3 { font-size: 15px; color: #f8fafc; margin-bottom: 2px; }
.place-card .info .ar { font-size: 12px; color: #94a3b8; margin-bottom: 3px; }
.cat-badge {
  display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: 10px; margin: 2px 0;
}
.cat-food { background: #ef444430; color: #fca5a5; }
.cat-cafe { background: #f59e0b30; color: #fcd34d; }
.cat-shop { background: #3b82f630; color: #93c5fd; }
.cat-street { background: #22c55e30; color: #86efac; }
.place-card .info .desc { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.place-card .info .rating { font-size: 12px; margin-top: 3px; color: #fbbf24; }
.place-card .info .price { font-size: 12px; color: #fbbf24; margin-top: 2px; }
.place-card .info .youtube { font-size: 11px; margin-top: 4px; }
.place-card .info .youtube a { color: #f87171; text-decoration: none; font-weight: 500; }
.leaflet-popup-content { direction: rtl; text-align: right; font-size: 13px; min-width: 200px; }
.leaflet-popup-content h3 { font-size: 14px; margin-bottom: 3px; color: #1e293b; }
.leaflet-popup-content .ar { font-size: 12px; color: #64748b; }
.leaflet-popup-content .desc { font-size: 12px; margin-top: 4px; }
.leaflet-popup-content .rating { font-size: 12px; margin-top: 3px; color: #f59e0b; }
</style>
</head>

  return L.divIcon({
    html: `<div style="background:${color};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5);"></div>`,
    iconSize:[30,30], iconAnchor:[15,15], className:''
  });
}

const markers = [], markerMap = {};
places.forEach((p,i)=>{
  const m = L.marker([p.lat,p.lng], {icon:makeIcon(COLORS[p.cat])}).addTo(map);
  m.bindPopup(`<div style="direction:rtl;text-align:right;font-family:sans-serif;">
    <h3>${p.emoji} ${p.name}</h3>
    <div style="font-size:12px;color:#64748b;">${p.ar}</div>
    <div style="margin:4px 0;font-size:13px;">${p.desc}</div>
    ${p.rating?`<div style="color:#f59e0b;font-size:12px;">${p.rating}</div>`:''}
    ${p.price?`<div style="font-size:12px;">${p.price}</div>`:''}
    ${p.youtube?`<div style="margin-top:4px;"><a href="${p.youtube}" target="_blank" style="color:#ef4444;">▶️ צפה ביוטיוב</a></div>`:''}
  </div>`);
  markers.push(m); markerMap[i]=m; p._idx=i;
});

function renderList(filter){
  const el = document.getElementById('placesList');
  el.innerHTML = '';
  const filtered = filter==='all' ? places : places.filter(p=>p.cat===filter);
  filtered.forEach(p=>{
    const card = document.createElement('div'); card.className='place-card';
    card.onclick = ()=>{
      const mi = markerMap[p._idx]; if(mi){ map.setView([p.lat,p.lng],15,{animate:true}); mi.openPopup(); }
    };
    const catLabel = {food:'🍽️ מסעדה',cafe:'☕ בית קפה',shop:'🛍️ קניות',street:'🌈 רחוב/איזור'}[p.cat];
    card.innerHTML = `<div class="info">
      <h3>${p.emoji} ${p.name}</h3>
      <div class="ar">${p.ar}</div>
      <span class="cat-badge cat-${p.cat}">${catLabel}</span>
      <div class="desc">${p.desc}</div>
      ${p.rating?`<div class="rating">${p.rating}</div>`:''}
      ${p.price?`<div class="price">${p.price}</div>`:''}
      ${p.youtube?`<div class="youtube">▶️ <a href="${p.youtube}" target="_blank">צפה ביוטיוב</a></div>`:''}
    </div>`;
    el.appendChild(card);
  });
}

function filterPlaces(cat){
  document.querySelectorAll('#filters .legend-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`#filters [onclick*="${cat}"]`)?.classList.add('active');
  markers.forEach((m,i)=>{ if(cat==='all'||places[i].cat===cat) map.addLayer(m); else map.removeLayer(m); });
  renderList(cat);
}

renderList('all');
const group = L.featureGroup(markers);
map.fitBounds(group.getBounds().pad(0.15));
</script>
</body>
</html>
